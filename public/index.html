<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchlist Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>📈 Asset Watchlist Manager</h1>

      <div class="filters">
        <button onclick="fetchDashboardData()">Show All</button>
        <button onclick="fetchDashboardData('crypto')">
          Cryptocurrencies Only
        </button>
        <button onclick="fetchDashboardData('metals')">
          Precious Metals Only
        </button>
      </div>

      <table id="watchlist-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Symbol</th>
            <th>Category</th>
            <th>Price ($)</th>
          </tr>
        </thead>
        <tbody id="watchlist-body"></tbody>
      </table>

      <div class="form-section">
        <h3>➕ Add New Tracked Asset</h3>
        <form id="asset-form">
          <input
            type="text"
            id="asset-name"
            placeholder="Asset Name (e.g. Silver)"
            required
          />
          <input
            type="text"
            id="asset-symbol"
            placeholder="Symbol (e.g. XAG)"
            required
          />
          <select id="asset-category" required>
            <option value="crypto">Cryptocurrency</option>
            <option value="metals">Precious Metal</option>
          </select>
          <input
            type="number"
            id="asset-price"
            placeholder="Current Price"
            step="any"
            required
          />
          <button type="submit">Save to Watchlist</button>
        </form>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
