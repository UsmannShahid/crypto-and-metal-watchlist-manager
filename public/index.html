<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto & Metal Watchlist Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Asset Watchlist Manager</h1>
    </header>

    <main>
      <section class="controls-section">
        <label for="categoryFilter">Filter by Category:</label>
        <select id="categoryFilter">
          <option value="all">All Assets</option>
          <option value="crypto">Cryptocurrency</option>
          <option value="metals">Precious Metals</option>
        </select>
      </section>

      <section class="watchlist-section">
        <h2>My Watchlist</h2>
        <div id="assetContainer">
          <p class="loading-text">Loading assets...</p>
        </div>
      </section>

      <hr />

      <section class="form-section">
        <h2>Add New Asset</h2>
        <form id="addAssetForm">
          <div class="form-group">
            <label for="assetName">Asset Name:</label>
            <input
              type="text"
              id="assetName"
              required
              placeholder="e.g., Bitcoin, Gold"
            />
          </div>

          <div class="form-group">
            <label for="assetSymbol">Symbol:</label>
            <input
              type="text"
              id="assetSymbol"
              required
              placeholder="e.g., BTC, XAU"
            />
          </div>

          <div class="form-group">
            <label for="assetCategory">Category:</label>
            <select id="assetCategory" required>
              <option value="" disabled selected>Select a category</option>
              <option value="crypto">Cryptocurrency</option>
              <option value="metals">Precious Metals</option>
            </select>
          </div>

          <div class="form-group">
            <label for="assetPrice">Current Price (USD):</label>
            <input
              type="number"
              id="assetPrice"
              step="any"
              required
              placeholder="e.g., 65000, 2300"
            />
          </div>

          <button type="submit">Add to Watchlist</button>
        </form>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
